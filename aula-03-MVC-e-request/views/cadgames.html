{% extends 'base.html' %}
{%block content%}
<h2>Cadastro de jogos</h2>
<hr>

<form action="{{url_for('cadgames')}}" method="post">
    <label>titulo</label>
    <input type="text" name="titulo" placeholder="Insira o nome do jogo" class="form-control" required>
    <label>categoria</label>
    <input type="text" name="titulo" placeholder="Insira a categoria do jogo" class="form-control" required>
    <label>ano</label>
    <input type="text" name="titulo" placeholder="Insira o ano do jogo" class="form-control" required>

    <!-- botões -->
    <input type="submit" value="Cadastrar" class="btn btn-success">
    <input type="reset" value="Limpar" class="btn btn-danger">
</form>
<br>
<hr>
<h4>Jogos cadastrados:</h4>
<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>Titulo</th>
            <th>categoria</th>
            <th>Ano</th>
        </tr>
    </thead>
    <tbody>
        <!-- Aqui ira o FOR -->
         {%for the game in listagames%}
         <tr>
            <td>{{game.titulo}}</td>
            <td>{{game.categoria}}</td>
            <td>{{game.ano}}</td>
         </tr>
         {%endfor%}
    </tbody>
</table>
{%endblock content%}
